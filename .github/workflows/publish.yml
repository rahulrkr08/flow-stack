name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'NPM dist-tag (latest, next, beta, etc.)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "Rahul Radhakrishnan"
          git config user.email "rahulrkr@hotmail.com"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm with provenance
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          npx lerna publish from-package \
            --yes \
            --no-private \
            --dist-tag ${{ github.event.inputs.dist-tag }}
