name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'NPM dist-tag (latest, beta, dev, etc.)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # We remove registry-url here because OIDC works best 
          # when npm discovers the registry configuration itself.

      - name: Configure Git
        run: |
          git config user.name "Rahul Radhakrishnan"
          git config user.email "rahulrkr@hotmail.com"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish to npm
        run: |
          # 1. Bump versions and create Git tags first to avoid index.lock issues
          npx lerna version --yes --message "chore(release): publish"

          # 2. Use 'from-package' to publish the newly versioned packages.
          # This command is the most compatible with OIDC Trusted Publishing.
          npx lerna publish from-package \
            --yes \
            --no-private \
            --dist-tag ${{ github.event.inputs.dist-tag }}
