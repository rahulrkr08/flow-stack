name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'NPM dist-tag (latest, beta, dev, etc.)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          # We remove registry-url here because OIDC works best 
          # when npm discovers the registry configuration itself.

      - name: Configure Git
        run: |
          git config user.name "Rahul Radhakrishnan"
          git config user.email "rahulrkr@hotmail.com"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish to npm
        run: |
          # 1. Update versions and tags (already done in your last run, 
          # but keep for future automation).
          npx lerna version --yes --message "chore(release): publish" || echo "No changes to version"

          # 2. Bypass Lerna's internal publisher and use native NPM CLI.
          # This forces NPM to handle the OIDC handshake directly.
          # We use --no-prepublishOnly to avoid the infinite build loop 
          # seen in your last log.
          npx lerna exec --no-private -- \
            npm publish --access public --dist-tag ${{ github.event.inputs.dist-tag }}

