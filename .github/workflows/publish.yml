name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'NPM dist-tag (latest, beta, dev, etc.)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "Rahul Radhakrishnan"
          git config user.email "rahulrkr@hotmail.com"

      - name: Install dependencies (root + workspaces)
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish to npm
        run: |
          # Use -- to separate lerna flags from the command being executed
          npx lerna exec --no-private -- npx lerna publish --yes --dist-tag ${{ github.event.inputs.dist-tag }}
